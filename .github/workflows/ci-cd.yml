name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image: ghcr.io/${{ github.repository }}/recipe-api:${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/recipe-api" >> $GITHUB_ENV

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ github.sha }} \
            -t $IMAGE_NAME:latest \
            .

      - name: Push image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

  test:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Start services with Docker Compose
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/recipe-api:${{ github.sha }} \
          docker compose up -d

      - name: Wait for app to start
        run: sleep 15

      - name: Health check
        run: |
          curl --fail http://localhost:8080 || exit 1

      - name: Show logs if failed
        if: failure()
        run: docker compose logs

      - name: Cleanup
        run: docker compose down

  deploy:
    runs-on: self-hosted
    needs: test

    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest image
        run: docker pull ghcr.io/${{ github.repository }}/recipe-api:latest

      - name: Restart services with Docker Compose
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/recipe-api:latest \
          docker compose down
          
          IMAGE=ghcr.io/${{ github.repository }}/recipe-api:latest \
          docker compose up -d