name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          MONGO_URI: ${{ secrets.MONGO_TEST_URI }}
        run: ./gradlew test

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set image name
        id: meta
        run: echo "image=ghcr.io/zixhd/recipe-api" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: [self-hosted]
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull new image
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          APP_VERSION: ${{ github.sha }}
        run: docker compose -f docker-compose.prod.yml pull

      - name: Deploy with zero-downtime rollout
        env:
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          APP_VERSION: ${{ github.sha }}
        run: docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Smoke test production
        run: |
          for i in $(seq 1 15); do
            curl -sf https://your-domain.com/config/health-check && exit 0
            sleep 4
          done
          echo "Production health check failed" && exit 1

      - name: Rollback on failure
        if: failure()
        env:
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          APP_VERSION: ${{ github.event.before }}
        run: |
          echo "Rolling back to $APP_VERSION"
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d