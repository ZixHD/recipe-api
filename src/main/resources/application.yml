spring:
  data:
    redis:
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      access: unrestricted
  metrics:
    tags:
      application: recipe-api
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms,500ms,1s,2s
    enable:
      jvm: true
      process: true
      logback: true
      mongodb: true
      redis: true